<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天我生日，一起來畫花🎂</title>
    <style>
        :root {
            --brown-dark: #5d4037;
            --brown-light: #8b5e3c;
            --bg-color: #fdfcf0;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative; overflow-x: hidden;
            touch-action: pan-y; /* 允許垂直滾動，但禁止畫布干擾 */
        }

        /* 背景裝飾 */
        .bg-flower { position: fixed; z-index: -1; opacity: 0.3; pointer-events: none; user-select: none; }
        .f-1 { top: 5%; left: -20px; font-size: 60px; }
        .f-2 { top: 15%; right: -10px; font-size: 40px; }
        .f-3 { bottom: 10%; left: 10%; font-size: 50px; }
        .f-4 { bottom: 20%; right: 5%; font-size: 70px; }

        /* 頁面切換 */
        #drawingPage { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }
        #resultPage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 450px; animation: fadeIn 0.8s ease; }

        .page-title { color: var(--brown-light); font-size: 1.6em; margin-bottom: 15px; font-weight: bold; text-align: center; }

        /* 畫板 */
        .canvas-wrapper {
            position: relative; background-color: #fcfaf5;
            background-image: radial-gradient(#e0ddd5 1px, transparent 0);
            background-size: 8px 8px; border: 10px solid #fff; border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px;
        }
        canvas { cursor: crosshair; touch-action: none; display: block; }
        
        .tool-bar { display: flex; gap: 8px; background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .tool-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; background: white; }
        .tool-btn.active { background: var(--brown-light); color: white; border-color: var(--brown-light); }

        .controls { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        input[type="text"] { padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-submit { background: var(--brown-light); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.2em; cursor: pointer; }

        /* --- 照片與互動花朵區 --- */
        .photo-frame { 
            position: relative; border-radius: 15px; background: #fff;
            padding: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 100%; box-sizing: border-box;
            line-height: 0; user-select: none;
        }
        .photo-bg { width: 100%; height: auto; display: block; border-radius: 5px; pointer-events: none; }
        
        .flowers-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; overflow: hidden;
        }

        .flower-item { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            cursor: move; pointer-events: auto; touch-action: none;
            z-index: 10;
        }

        .flower-img { 
            width: 75px; height: 75px; object-fit: contain; 
            filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.3)); 
            animation: swing 3s ease-in-out infinite;
            pointer-events: none; /* 讓點擊穿透到容器 */
        }
        
        .flower-msg { 
            background: rgba(255,255,255,0.98); padding: 6px 12px; border-radius: 12px; 
            font-size: 14px; border: 2px solid var(--brown-light); white-space: nowrap; 
            font-weight: bold; color: var(--brown-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 5px; pointer-events: none;
            user-select: none;
            opacity: 0.9;
        }

        .btn-back { margin-top: 25px; background: #fff; color: var(--brown-light); border: 2px solid var(--brown-light); padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        @keyframes swing { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-flower f-1">🌸</div><div class="bg-flower f-2">🌼</div><div class="bg-flower f-3">🌷</div><div class="bg-flower f-4">🌹</div>

    <div id="drawingPage">
        <h1 class="page-title"> 今天我生日，一起來畫花🎂 </h1>
        <div class="canvas-wrapper"><canvas id="paintCanvas" width="300" height="300"></canvas></div>
        <div class="tool-bar">
            <input type="color" id="colorPicker" value="#e63946" style="border:none; width:35px; height:35px; cursor:pointer;">
            <button class="tool-btn active" id="sizeS" onclick="setSize(3, 'sizeS')">細</button>
            <button class="tool-btn" id="sizeM" onclick="setSize(8, 'sizeM')">中</button>
            <button class="tool-btn" id="eraserBtn" onclick="setEraser()">橡皮擦</button>
            <button class="tool-btn" onclick="clearCanvas()">重畫</button>
        </div>
        <div class="controls">
            <div class="message-label">你想對我說的話是？(◕u◕)</div>
            <input type="text" id="messageInput" placeholder="輸入祝福...">
            <button class="btn-submit" id="submitBtn" onclick="submitFlower()">送出成果</button>
            <button style="background:none; border:none; color:#999; text-decoration:underline; cursor:pointer; margin-top:10px;" onclick="goToResult()">先看看大家送的花</button>
        </div>
    </div>

    <div id="resultPage">
        <h1 class="page-title">💐 生日花束集結 💐</h1>
        <div class="photo-frame">
            <img src="https://cdn.phototourl.com/free/2026-04-29-d29c94e6-d034-457d-8ddb-a124debfec49.jpg" class="photo-bg" id="mainPhoto">
            <div class="flowers-overlay" id="flowersOverlay"></div>
        </div>
        <p style="color:#999; font-size:0.9em; margin-top:10px;">✨ 試著用手指搬動花朵吧！ ✨</p>
        <button class="btn-back" onclick="goBack()">我也要送一朵</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('flowersOverlay');
        const submitBtn = document.getElementById('submitBtn');
        const colorPicker = document.getElementById('colorPicker');
        let painting = false; let isEraser = false; let currentSize = 3;

        const API_URL = 'https://script.google.com/macros/s/AKfycbwIdPLuNptnDk2AsiwhZPjfJNO0QgqsPsTL0LyU4PsLE3U2RY1elKGszeKol1WIPqtW/exec'; 

        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // 畫筆功能
        function startPosition(e) { painting = true; draw(e); }
        function finishedPosition() { painting = false; ctx.beginPath(); }
        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
            ctx.strokeStyle = isEraser ? 'rgba(0,0,0,1)' : colorPicker.value;
            ctx.lineWidth = isEraser ? currentSize * 3 : currentSize;
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }

        function setSize(size, id) { currentSize = size; isEraser = false; updateBtn(id); }
        function setEraser() { isEraser = true; updateBtn('eraserBtn'); }
        function updateBtn(id) { document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- 拖曳功能邏輯 ---
        let highestZ = 100;
        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            el.onmousedown = dragMouseDown;
            el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                // 點擊時跳到最上層
                highestZ++;
                el.style.zIndex = highestZ;
                
                if (e.type === 'touchstart') {
                    pos3 = e.touches[0].clientX;
                    pos4 = e.touches[0].clientY;
                } else {
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                }
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        function renderFlower(imgData, msg) {
            const flowerWrap = document.createElement('div');
            flowerWrap.className = 'flower-item';
            
            // 初始範圍縮小在包裝紙中心
            const randomX = Math.random() * 30 + 25; 
            const randomY = Math.random() * 15 + 45; 
            
            flowerWrap.style.left = randomX + '%';
            flowerWrap.style.top = randomY + '%';

            const dur = (Math.random() * 2 + 2).toFixed(2);
            const del = (Math.random() * 2).toFixed(2);
            
            flowerWrap.innerHTML = `<div class="flower-msg">${msg}</div><img src="${imgData}" class="flower-img" style="animation-duration:${dur}s; animation-delay:-${del}s;">`;
            
            overlay.appendChild(flowerWrap);
            makeDraggable(flowerWrap); // 賦予拖曳能力
        }

        function submitFlower() {
            const message = document.getElementById('messageInput').value;
            if (!message) return alert("請輸入祝福！");
            const imageData = canvas.toDataURL();
            submitBtn.innerText = "傳送中..."; submitBtn.disabled = true;
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ message: message, imageData: imageData }) })
            .then(() => { goToResult(); renderFlower(imageData, message); clearCanvas(); document.getElementById('messageInput').value = ""; submitBtn.innerText = "送出成果"; submitBtn.disabled = false; });
        }

        function goToResult() { document.getElementById('drawingPage').style.display = 'none'; document.getElementById('resultPage').style.display = 'flex'; }
        function goBack() { document.getElementById('resultPage').style.display = 'none'; document.getElementById('drawingPage').style.display = 'flex'; }

        window.onload = function() { fetch(API_URL).then(res => res.json()).then(data => { if(data && data.length > 0) data.forEach(f => renderFlower(f.imageData, f.message)); }); };

        canvas.addEventListener('mousedown', startPosition); canvas.addEventListener('mouseup', finishedPosition); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e.touches[0]); }, {passive: false}); 
        canvas.addEventListener('touchend', finishedPosition); 
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); }, {passive: false});
    </script>
</body>
</html>
